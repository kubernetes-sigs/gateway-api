apiVersion: v1
kind: Service
metadata:
  name: udp-echo-multi-listener
  namespace: gateway-conformance-infra
  labels:
    app: udp-echo-multi-listener
spec:
  selector:
    app: udp-echo-multi-listener
  ports:
    - name: udp
      protocol: UDP
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: udp-echo-multi-listener
  namespace: gateway-conformance-infra
  labels:
    app: udp-echo-multi-listener
spec:
  replicas: 1
  selector:
    matchLabels:
      app: udp-echo-multi-listener
  template:
    metadata:
      labels:
        app: udp-echo-multi-listener
    spec:
      containers:
        - name: udp-echo
          image: registry.k8s.io/gateway-api/echo-basic:v1.5.1
          imagePullPolicy: IfNotPresent
          env:
            - name: UDP_ECHO_SERVER
              value: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: udp-echo-multi-listener
          ports:
            - containerPort: 8080
              protocol: UDP
          resources:
            requests:
              cpu: 10m
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: udp-multi-listener-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: dns
      protocol: UDP
      port: 5300
      allowedRoutes:
        kinds:
          - kind: UDPRoute
    - name: game
      protocol: UDP
      port: 7777
      allowedRoutes:
        kinds:
          - kind: UDPRoute
---
# Scenario 1: parentRef with `port` only (matches the listener on port 5300).
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: udp-route-by-port
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: udp-multi-listener-gateway
      port: 5300
  rules:
    - backendRefs:
        - name: udp-echo-multi-listener
          port: 8080
---
# Scenario 3: parentRef with both `sectionName` and `port`.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: udp-route-by-section-and-port
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: udp-multi-listener-gateway
      sectionName: dns
      port: 5300
  rules:
    - backendRefs:
        - name: udp-echo-multi-listener
          port: 8080
---
# Scenario 4: parentRef with neither `port` nor `sectionName`. Should attach to all UDP listeners on the Gateway.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: udp-route-attach-all
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: udp-multi-listener-gateway
  rules:
    - backendRefs:
        - name: udp-echo-multi-listener
          port: 8080
