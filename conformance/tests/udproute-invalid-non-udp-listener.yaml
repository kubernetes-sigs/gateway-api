apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: udp-mixed-protocol-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: tcp-listener
      protocol: TCP
      port: 9300
      allowedRoutes:
        kinds:
          - kind: TCPRoute
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: udp-route-on-tcp-listener
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: udp-mixed-protocol-gateway
      sectionName: tcp-listener
  rules:
    - backendRefs:
        - name: udp-echo-backend
          port: 8080
