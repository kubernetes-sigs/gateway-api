apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: direct-response-with-body
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - name: same-namespace
  rules:
  - matches:
    - path:
        type: Exact
        value: /direct-response/body
    filters:
    - type: DirectResponse
      directResponse:
        statusCode: 200
        body:
          string: "hello, gateway"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: direct-response-no-body
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - name: same-namespace
  rules:
  - matches:
    - path:
        type: Exact
        value: /direct-response/no-body
    filters:
    - type: DirectResponse
      directResponse:
        statusCode: 204
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: direct-response-forbidden
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - name: same-namespace
  rules:
  - matches:
    - path:
        type: Exact
        value: /direct-response/forbidden
    filters:
    - type: DirectResponse
      directResponse:
        statusCode: 403
        body:
          string: "Forbidden"
