apiVersion: v1
kind: Service
metadata:
  name: tcp-echo-multi-listener
  namespace: gateway-conformance-infra
  labels:
    app: tcp-echo-multi-listener
spec:
  selector:
    app: tcp-echo-multi-listener
  ports:
    - name: tcp
      protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-echo-multi-listener
  namespace: gateway-conformance-infra
  labels:
    app: tcp-echo-multi-listener
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tcp-echo-multi-listener
  template:
    metadata:
      labels:
        app: tcp-echo-multi-listener
    spec:
      containers:
        - name: tcp-echo
          image: registry.k8s.io/gateway-api/echo-basic:v1.5.1
          imagePullPolicy: IfNotPresent
          env:
            - name: TCP_ECHO_SERVER
              value: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: tcp-echo-multi-listener
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 10m
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: tcp-multi-listener-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: primary
      protocol: TCP
      port: 9300
      allowedRoutes:
        kinds:
          - kind: TCPRoute
    - name: secondary
      protocol: TCP
      port: 9301
      allowedRoutes:
        kinds:
          - kind: TCPRoute
---
# Scenario 1: parentRef with `port` only (matches the listener on port 9300).
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: tcp-route-by-port
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: tcp-multi-listener-gateway
      port: 9300
  rules:
    - backendRefs:
        - name: tcp-echo-multi-listener
          port: 3000
---
# Scenario 3: parentRef with both `sectionName` and `port`.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: tcp-route-by-section-and-port
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: tcp-multi-listener-gateway
      sectionName: primary
      port: 9300
  rules:
    - backendRefs:
        - name: tcp-echo-multi-listener
          port: 3000
---
# Scenario 4: parentRef with neither `port` nor `sectionName`. Should attach to all TCP listeners on the Gateway.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: tcp-route-attach-all
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: tcp-multi-listener-gateway
  rules:
    - backendRefs:
        - name: tcp-echo-multi-listener
          port: 3000
