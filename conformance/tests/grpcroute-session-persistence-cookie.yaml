apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: grpcroute-session-persistence-cookie
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - name: same-namespace
  rules:
  - sessionPersistence:
      type: Cookie
    backendRefs:
    - name: grpc-infra-backend-v1
      port: 8080
