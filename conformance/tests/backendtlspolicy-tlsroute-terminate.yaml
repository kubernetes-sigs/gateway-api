apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-btls-tlsroute-terminate
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
  - name: tls-terminate
    port: 8443
    protocol: TLS
    hostname: tls.example.com
    allowedRoutes:
      namespaces:
        from: Same
      kinds:
      - kind: TLSRoute
    tls:
      mode: Terminate
      certificateRefs:
      - name: tls-terminate-checks-certificate
---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: TLSRoute
metadata:
  name: backendtlspolicy-tlsroute-terminate
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - name: gateway-btls-tlsroute-terminate
    namespace: gateway-conformance-infra
  hostnames:
  - tls.example.com
  rules:
  - backendRefs:
    - name: btls-terminate-tcp-backend
      port: 8443
---
apiVersion: v1
kind: Service
metadata:
  name: btls-terminate-tcp-backend
  namespace: gateway-conformance-infra
spec:
  selector:
    app: btls-terminate-tcp-backend
  ports:
  - name: "btls"
    protocol: TCP
    port: 8443
    targetPort: 8443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: btls-terminate-tcp-backend
  namespace: gateway-conformance-infra
  labels:
    app: btls-terminate-tcp-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: btls-terminate-tcp-backend
  template:
    metadata:
      labels:
        app: btls-terminate-tcp-backend
    spec:
      containers:
      - name: btls-terminate-tcp-backend
        image: gcr.io/k8s-staging-gateway-api/echo-basic:v20260204-monthly-2026.01-60-g28382302
        resources:
          requests:
            cpu: 10m
        volumeMounts:
        - name: secret-volume
          mountPath: /etc/secret-volume
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: TLS_SERVER_CERT
          value: /etc/secret-volume/crt
        - name: TLS_SERVER_PRIV_KEY
          value: /etc/secret-volume/key
        - name: TCP_ECHO_SERVER
          value: "1"
      volumes:
      - name: secret-volume
        secret:
          secretName: tls-checks-certificate
          items:
          - key: tls.crt
            path: crt
          - key: tls.key
            path: key
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: btls-tlsroute-terminate-test
  namespace: gateway-conformance-infra
spec:
  targetRefs:
  - group: ""
    kind: Service
    name: "btls-terminate-tcp-backend"
    sectionName: "btls"
  validation:
    caCertificateRefs:
    - group: ""
      kind: ConfigMap
      name: "tls-checks-ca-certificate"
    hostname: "abc.example.com"
