---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-tls-hostname
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: tls
      port: 443
      protocol: TLS
      hostname: "www.example.com"
      allowedRoutes:
        namespaces:
          from: Same
        kinds:
          - kind: TLSRoute
      tls:
        mode: Passthrough
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: tlsroute-hostname-mismatch
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: gateway-tls-hostname
      port: 443
  hostnames:
    - www.example1.com
  rules:
    - backendRefs:
        - name: tls-backend
          port: 443
