apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: tcp-mixed-protocol-gateway
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
    - name: udp-listener
      protocol: UDP
      port: 5300
      allowedRoutes:
        kinds:
          - kind: UDPRoute
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: tcp-route-on-udp-listener
  namespace: gateway-conformance-infra
spec:
  parentRefs:
    - name: tcp-mixed-protocol-gateway
      sectionName: udp-listener
  rules:
    - backendRefs:
        - name: tcp-echo-backend
          port: 8080
