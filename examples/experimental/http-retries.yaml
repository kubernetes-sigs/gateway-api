#$ Used in:
#$ - site/content/en/guides/user-guides/http-retries.md
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: retry-example
spec:
  parentRefs:
  - name: example-gateway
  rules:
  - backendRefs:
    - name: backend-svc
      port: 8080
    retry:
      codes:
      - 500
      - 503
      - 504
      attempts: 2
