#$ Used in:
#$ - guides/user-guides/udp.md
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: my-udp-gateway
spec:
  gatewayClassName: my-udp-gateway-class
  listeners:
    - name: foo
      protocol: UDP
      port: 8080
      allowedRoutes:
        kinds:
          - kind: UDPRoute
    - name: bar
      protocol: UDP
      port: 8090
      allowedRoutes:
        kinds:
          - kind: UDPRoute
---
apiVersion: gateway.networking.k8s.io/v1
kind: UDPRoute
metadata:
  name: udp-app-1
spec:
  parentRefs:
    - name: my-udp-gateway
      sectionName: foo
  rules:
    - backendRefs:
        - name: my-foo-service
          port: 6000
---
apiVersion: gateway.networking.k8s.io/v1
kind: UDPRoute
metadata:
  name: udp-app-2
spec:
  parentRefs:
    - name: my-udp-gateway
      sectionName: bar
  rules:
    - backendRefs:
        - name: my-bar-service
          port: 6000
