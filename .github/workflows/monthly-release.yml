name: Monthly Release

# Manual only: create and push the tag first (e.g. git tag monthly-2026.02 && git push origin monthly-2026.02),
# then Actions → Run workflow → enter the same tag. This workflow verifies the tag exists and builds the release.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing monthly tag on origin (required): monthly-YYYY.MM — push the tag before running this workflow"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: read

jobs:
  create-monthly-release:
    name: Create Monthly Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag=v6.4.0
        with:
          go-version-file: "go.work"

      - name: Verify monthly tag format and set outputs
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="$(echo -n "${INPUT_TAG}" | tr -d '[:space:]')"
          if [ -z "${TAG}" ]; then
            echo "::error::Tag must be provided."
            exit 1
          fi
          # Required: monthly-YYYY.MM (four-digit year, zero-padded month 01–12)
          if [[ ! "${TAG}" =~ ^monthly-[0-9]{4}\.[0-9]{2}$ ]]; then
            echo "::error::Invalid tag name: '${TAG}'. Expected monthly-YYYY.MM (e.g. monthly-2026.01)."
            exit 1
          fi
          YEAR_MONTH="${TAG#monthly-}"
          MM="${YEAR_MONTH#*.}"
          if (( 10#${MM} < 1 || 10#${MM} > 12 )); then
            echo "::error::Invalid month in tag '${TAG}': month must be 01–12."
            exit 1
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "year_month=${YEAR_MONTH}" >> $GITHUB_OUTPUT
          echo "Tag format OK: ${TAG}"

      - name: Verify tag exists on remote and checkout
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          git fetch --tags --force
          if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag '${TAG}' not found after fetch. Create and push it to origin first (e.g. git tag ${TAG} && git push origin ${TAG}), then run this workflow."
            exit 1
          fi
          git checkout "${TAG}"
          echo "Checked out ${TAG} at $(git rev-parse --short HEAD)"

      - name: Build monthly YAML
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          MONTHLY_NONINTERACTIVE: "true"
        run: |
          make build-monthly-yaml

      - name: Install Helm
        uses: azure/setup-helm@v4
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Log into registry ${{ env.HELM_REGISTRY }}
        uses: docker/login-action@28218f9b04b4f3f62068d7b6ce6ca5b26e35336c
        env:
          HELM_REGISTRY: ghcr.io
          CHART_DIR: helm
        with:
          registry: ${{ env.HELM_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm charts to registry
        env:
          HELM_REGISTRY: ghcr.io
          CHART_DIR: helm
        run: |
          helm dependency update ./${{ env.CHART_DIR }}
          cp -R release helm/files
          helm package ./${{ env.CHART_DIR }} --destination ./chart --app-version ${{ steps.tag.outputs.tag }} --version ${{ steps.tag.outputs.tag }}
          helm push ./chart/${{ github.event.repository.name }}-${{ steps.tag.outputs.tag }}.tgz oci://${{ env.HELM_REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}

      - name: Release with notes
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          STEPS_TAG_OUTPUTS_TAG: ${{ steps.tag.outputs.tag }}
          STEPS_TAG_OUTPUTS_YEAR_MONTH: ${{ steps.tag.outputs.year_month }}
        run: |
          TAG="${STEPS_TAG_OUTPUTS_TAG}"
          YEAR_MONTH=$(echo ""${STEPS_TAG_OUTPUTS_YEAR_MONTH}"" | sed 's/\./-/')
          YEAR=$(echo "$YEAR_MONTH" | cut -d- -f1)
          MONTH_NAME=$(date -d "${YEAR_MONTH}-01" +"%B")

          git fetch --tags --force

          PREV_TAG=$(git tag -l "monthly-*" | sort -V | grep -B1 "^${TAG}$" | head -n1)

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" == "$TAG" ]; then
            START_SHA=$(git rev-list -n 1 --before="1 month" origin/main)
          else
            START_SHA=$(git rev-parse "$PREV_TAG")
          fi
          END_SHA=$(git rev-parse HEAD)

          # Create the release notes header from template
          export TAG MONTH_NAME YEAR
          envsubst < .github/workflows/release-notes-header.template.md > release-notes.md

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
            # Add Full Changelog link
            printf '\n' >> release-notes.md
            COMPARE_URL="https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
            printf 'Full Changelog: [%s...%s](%s)\n' "${PREV_TAG}" "${TAG}" "${COMPARE_URL}" >> release-notes.md
            printf '\n' >> release-notes.md

            SINCE_DATE=$(git log -1 --format=%aI "${PREV_TAG}")
            DUE_DATE=$(git log -1 --format=%aI "${TAG}")
            echo "SINCE_DATE: ${SINCE_DATE}"
            echo "DUE_DATE: ${DUE_DATE}"

            echo "## Merged Pull Requests (${PREV_TAG} to ${TAG})" >> release-notes.md

            gh pr list \
              --base main \
              --state merged \
              --search "merged:${SINCE_DATE}..${DUE_DATE}" \
              --limit 500 \
              --json number,title,author \
              --template '{{range .}}* {{.title}} (#{{.number}}) @{{.author.login}}{{"\n"}}{{end}}' >> release-notes.md

          else
            printf '### Merged Pull Requests\n\n'
            printf 'No pull requests found in this release.\n' >> release-notes.md
          fi

          gh release create ${STEPS_TAG_OUTPUTS_TAG} \
            -F release-notes.md \
            --prerelease \
            --draft release/${STEPS_TAG_OUTPUTS_TAG}-install.yaml

      - name: Cleanup
        if: always()
        run: |
          rm -f release-notes.md

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Release Created" >> $GITHUB_STEP_SUMMARY
          echo "Successfully created monthly release: **${STEPS_TAG_OUTPUTS_TAG}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View the release: https://github.com/${{ github.repository }}/releases/tag/${STEPS_TAG_OUTPUTS_TAG}" >> $GITHUB_STEP_SUMMARY
        env:
          STEPS_TAG_OUTPUTS_TAG: ${{ steps.tag.outputs.tag }}
