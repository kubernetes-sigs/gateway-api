name: Verify docs broken links

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

# Remove all permissions from GITHUB_TOKEN except metadata.
permissions: {}

jobs:
  verify-docs:
    name: Build website and run lychee
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
        with:
          persist-credentials: false
      - name: Read versions from netlify.toml
        id: netlify-versions
        run: |
          PYTHON_VER=$(sed -n 's/.*PYTHON_VERSION *= *"\([^"]*\)".*/\1/p' netlify.toml)
          NODE_VER=$(sed -n 's/.*NODE_VERSION *= *"\([^"]*\)".*/\1/p' netlify.toml)
          echo "python-version=${PYTHON_VER}" >> $GITHUB_OUTPUT
          echo "node-version=${NODE_VER}" >> $GITHUB_OUTPUT
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag=v6.4.0
        with:
          go-version-file: 'go.work'
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # tag=v6.2.0
        with:
          python-version: ${{ steps.netlify-versions.outputs.python-version }}
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # tag=v6.4.0
        with:
          node-version: ${{ steps.netlify-versions.outputs.node-version }}
      - name: Run validation
        run: |
          make verify-docs
