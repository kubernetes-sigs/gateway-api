name: PR golangci-lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

# Remove all permissions from GITHUB_TOKEN except metadata.
permissions: {}

jobs:
  golangci:
    name: kube-api-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
        name: Checkout code
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # tag=v6.5.0
        with:
          go-version-file: 'go.work'
      - name: Install Golang CI Lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: Build KAL
        run: golangci-lint custom -v
      - name: run api linter
        env:
          GOOS: js
          GOARCH: wasm
        run: ./bin/golangci-kube-api-linter run -c ./.golangci-kal.yml ./...
